<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpPal — Your AI Fitness Companion</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .emoji { font-size: 80px; margin-bottom: 1rem; }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff6b35, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.2rem;
      color: #a0a0b0;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.3);
      color: #ff6b35;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #606070;
    }
    .footer a { color: #ff6b35; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🏋️</div>
    <h1>PumpPal</h1>
    <p class="tagline">Your AI-powered fitness companion.<br>Smart training. Real results.</p>
    <span class="badge">Coming Soon</span>
    <div class="footer">
      <p>A <a href="https://weare.biz">WEARE Inc</a> product</p>
      <p style="margin-top: 0.5rem;"><a href="privacy">Privacy Policy</a></p>
    </div>
  </div>
</body>
</html>
