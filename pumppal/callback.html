<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpPal — Authorization</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #d0d0d8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 500px; }
    .emoji { font-size: 60px; margin-bottom: 1rem; }
    h1 { color: #ff6b35; margin-bottom: 1rem; }
    .code {
      background: #1a1a2e;
      border: 1px solid #ff6b35;
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      margin: 1rem 0;
      user-select: all;
      cursor: pointer;
    }
    .hint { color: #707080; font-size: 0.9rem; }
    .error { color: #ff4444; }
    .success { color: #44ff88; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🏋️</div>
    <h1>PumpPal Authorization</h1>
    <div id="result"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('result');
    
    if (code) {
      el.innerHTML = `
        <p class="success">✅ Authorization successful!</p>
        <p class="hint">Copy this code and send it to Bob:</p>
        <div class="code" onclick="navigator.clipboard.writeText('${code}').then(() => this.style.borderColor='#44ff88')">${code}</div>
        <p class="hint">Tap the code to copy it. You can close this page after.</p>
      `;
    } else if (error) {
      el.innerHTML = `<p class="error">❌ Authorization failed: ${error}</p>`;
    } else {
      el.innerHTML = `<p class="hint">Waiting for authorization...</p>`;
    }
  </script>
</body>
</html>
